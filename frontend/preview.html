<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FathomSeed Preview</title>
    <meta http-equiv="refresh" content="0; url=/" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      main {
        width: min(560px, calc(100% - 32px));
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        background: white;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        color: #64748b;
        line-height: 1.7;
      }
      code {
        border-radius: 8px;
        background: #f1f5f9;
        padding: 2px 6px;
      }
      a {
        color: #4f46e5;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在打开真实 FathomSeed 前端</h1>
      <p>
        这个文件不再是手写 mock。请用 <code>npm run dev:preview</code> 启动 Vite，
        然后访问 <a href="/">真实 Vue 应用</a>。
      </p>
    </main>

</html>
